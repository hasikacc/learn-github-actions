name: Code Quality Analysis
on:
  push:
    branches:
      - master
jobs:
  check-code-flake8:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Set up Python environment
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Run flake8
        run: |
           pip install flake8 flake8-docstrings
           flake8 .
